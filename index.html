<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>食堂QRスキャナー</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; background: #f4f7f6; }
    #reader { width: 100%; max-width: 400px; margin: auto; border-radius: 15px; overflow: hidden; background: #000; min-height: 300px; }
    .btn { padding: 20px; font-size: 1.2em; background: #007bff; color: white; border: none; border-radius: 12px; width: 100%; max-width: 400px; margin-top: 20px; font-weight: bold; }
    #status { margin-top: 15px; padding: 20px; border-radius: 12px; display: none; color: white; font-weight: bold; font-size: 1.2em; }
  </style>
</head>
<body>
  <h2>篠山自動車教習所 食堂受付</h2>
  <div id="reader"></div>
  <button id="startBtn" class="btn" onclick="start()">📷 スキャン開始</button>
  <div id="status"></div>

  <script>
    // ★事務員さんのGASのURL（/exec）に書き換えてください
    const API_URL = "https://script.google.com/macros/s/AKfycbwfLVE77or2tD9WPaJX2Ks3uc5KtaknUQKrBFhFXUWbJYBa682O2Hj0HAhxBfkEu2eOoQ/exec";

    function start() {
      document.getElementById('startBtn').style.display = 'none';
      const scanner = new Html5Qrcode("reader");
      scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (id) => {
        const s = document.getElementById('status');
        s.style.display = 'block'; s.style.background = '#666'; s.innerHTML = "照会中...";
        
        // GASへデータを飛ばす（JSONP方式）
        const script = document.createElement('script');
        script.src = `${API_URL}?id=${encodeURIComponent(id)}&callback=onResult`;
        document.body.appendChild(script);
      }).catch(e => {
        alert("カメラ起動エラー: " + e);
        document.getElementById('startBtn').style.display = 'block';
      });
    }

    window.onResult = function(res) {
      const s = document.getElementById('status');
      s.style.background = res.success ? '#28a745' : '#dc3545';
      s.innerHTML = res.success ? "✅ OK！<br>" + res.msg : "❌ " + res.msg;
      setTimeout(() => {
        s.style.display = 'none';
        document.getElementById('startBtn').style.display = 'block';
      }, 5000);
    };
  </script>
</body>
</html>
